<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VcalliaX Intelligence Hub</title>

    <script>
        (() => {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.toggle('dark', savedTheme === 'dark' || (!savedTheme && prefersDark));
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter; transition-duration: 300ms; }
        body { font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.7); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.72); border-color: rgba(71, 85, 105, 0.45); }
        .task-done { opacity: 0.5; text-decoration: line-through; }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .note-item { border-left: 4px solid #818cf8; background: #f8fafc; }
        .dark .note-item { background: rgba(30, 41, 59, 0.72); border-left-color: #a5b4fc; }
        .kpi-card { border-bottom: 4px solid #6366f1; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 text-slate-800 transition-all duration-300 dark:bg-slate-950 dark:text-slate-100 md:p-10">
    <div class="mx-auto max-w-6xl">
        <header class="mb-8 flex items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-semibold tracking-normal text-slate-900 dark:text-slate-100 md:text-4xl">System <span class="font-light italic text-indigo-600 dark:text-indigo-400">Dashboard</span></h1>
                <p class="mt-2 text-slate-500 dark:text-slate-400">VcalliaX Intelligence Hub</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="date-display" class="hidden text-right text-sm font-medium uppercase tracking-widest text-slate-400 dark:text-slate-500 md:block"></div>
                <button id="theme-toggle" type="button" class="grid h-10 w-10 flex-shrink-0 place-items-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm hover:border-indigo-300 hover:text-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:border-slate-700 dark:bg-slate-900 dark:text-amber-300 dark:hover:border-amber-400 dark:hover:text-amber-200 dark:focus:ring-offset-slate-950" aria-label="Activar modo oscuro" aria-pressed="false" title="Cambiar tema">
                    <svg id="moon-icon" class="h-5 w-5 dark:hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
                    <svg id="sun-icon" class="hidden h-5 w-5 dark:block" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path stroke-linecap="round" d="M12 2v2m0 16v2M4.93 4.93l1.42 1.42m11.3 11.3 1.42 1.42M2 12h2m16 0h2M4.93 19.07l1.42-1.42m11.3-11.3 1.42-1.42"></path></svg>
                </button>
            </div>
        </header>

        <div class="mb-8 grid grid-cols-2 gap-4 md:grid-cols-4">
            <div class="glass-card kpi-card rounded-lg p-6 shadow-sm dark:shadow-black/20">
                <p class="mb-1 text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Ejecuciones Hoy</p>
                <h3 id="kpi-executions" class="text-3xl font-semibold text-slate-800 dark:text-slate-100">--</h3>
            </div>
            <div class="glass-card kpi-card rounded-lg border-b-emerald-500 p-6 shadow-sm dark:shadow-black/20">
                <p class="mb-1 text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Workflows Activos</p>
                <h3 id="kpi-workflows" class="text-3xl font-semibold text-slate-800 dark:text-slate-100">--</h3>
            </div>
            <div class="glass-card kpi-card rounded-lg border-b-amber-500 p-6 shadow-sm dark:shadow-black/20">
                <p class="mb-1 text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Alertas Críticas</p>
                <h3 id="kpi-alerts" class="text-3xl font-semibold text-slate-800 dark:text-slate-100">--</h3>
            </div>
            <div class="glass-card kpi-card rounded-lg border-b-slate-400 p-6 shadow-sm dark:shadow-black/20">
                <p class="mb-1 text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Última Sincro</p>
                <h3 id="kpi-time" class="mt-2 text-sm font-semibold text-slate-600 dark:text-slate-200">--:--</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
            <div class="space-y-6">
                <section class="glass-card rounded-lg p-8 shadow-sm dark:shadow-black/20">
                    <h2 class="mb-6 flex items-center text-xl font-semibold text-slate-800 dark:text-slate-100">
                        <svg class="mr-2 h-5 w-5 text-indigo-500 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                        Radar de Proyectos
                    </h2>
                    <div id="projects-container" class="space-y-6"></div>
                </section>

                <section class="rounded-lg border border-slate-800 bg-slate-900 p-6 text-white shadow-sm dark:border-slate-700 dark:bg-slate-900/90">
                    <h2 class="mb-4 flex items-center text-sm font-bold uppercase tracking-widest text-slate-400">
                        <span class="mr-2 h-2 w-2 animate-pulse rounded-full bg-emerald-500"></span>
                        Status: n8n Connected
                    </h2>
                    <div class="space-y-3 text-slate-300">
                        <div class="flex justify-between text-xs"><span>Mode</span><span class="font-bold text-white">Auto-Sync</span></div>
                        <div class="flex justify-between text-xs"><span>Source</span><span class="font-bold text-white">SYSTEM.json</span></div>
                    </div>
                </section>
            </div>

            <div class="space-y-6 lg:col-span-2">
                <section class="glass-card rounded-lg p-8 shadow-sm dark:shadow-black/20">
                    <h2 class="mb-6 flex items-center text-xl font-semibold text-slate-800 dark:text-slate-100">
                        <svg class="mr-2 h-5 w-5 text-indigo-500 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Próximas Tareas
                    </h2>
                    <div id="tasks-container" class="space-y-3"></div>
                </section>

                <section class="glass-card rounded-lg p-8 shadow-sm dark:shadow-black/20">
                    <h2 class="mb-6 flex items-center text-xl font-semibold text-slate-800 dark:text-slate-100">
                        <svg class="mr-2 h-5 w-5 text-amber-500 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        Notas Rápidas
                    </h2>
                    <div id="notes-container" class="grid grid-cols-1 gap-4 md:grid-cols-2"></div>
                </section>
            </div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');

        function updateThemeButton() {
            const isDark = root.classList.contains('dark');
            themeToggle.setAttribute('aria-label', isDark ? 'Activar modo claro' : 'Activar modo oscuro');
            themeToggle.setAttribute('aria-pressed', String(isDark));
        }

        themeToggle.addEventListener('click', () => {
            const isDark = root.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButton();
        });

        updateThemeButton();
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        async function loadSystemMetrics() {
            try {
                const response = await fetch(`SYSTEM.json?v=${Date.now()}`, { cache: 'no-store' });
                const data = await response.json();
                document.getElementById('kpi-executions').innerText = data.executions_today;
                document.getElementById('kpi-workflows').innerText = data.active_workflows;
                document.getElementById('kpi-alerts').innerText = data.critical_alerts;
                document.getElementById('kpi-time').innerText = data.last_execution;
            } catch (e) { console.error('Error cargando métricas', e); }
        }

        async function loadTasks() {
            const container = document.getElementById('tasks-container');
            try {
                const response = await fetch(`TASKS.md?v=${Date.now()}`, { cache: 'no-store' });
                const text = await response.text();
                container.innerHTML = text.split('\n').filter(line => line.trim().startsWith('-')).map(line => {
                    const isDone = line.includes('[x]');
                    const taskText = line.replace(/^- \[[ x]\] /, '').replace(/^- /, '');
                    return `<div class="flex items-center rounded-lg border border-slate-100 bg-white/50 p-3 transition-all duration-300 dark:border-slate-700/70 dark:bg-slate-800/60 ${isDone ? 'task-done' : 'hover:border-indigo-200 dark:hover:border-indigo-500/60'}">
                        <div class="mr-3 flex h-5 w-5 flex-shrink-0 items-center justify-center rounded-full border-2 ${isDone ? 'border-indigo-500 bg-indigo-500' : 'border-indigo-300 dark:border-indigo-400'}">
                            ${isDone ? '<svg class="h-3 w-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-200">${taskText}</span>
                    </div>`;
                }).join('');
            } catch (e) { container.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Error cargando tareas.</p>'; }
        }

        async function loadProjects() {
            const container = document.getElementById('projects-container');
            try {
                const response = await fetch(`PROJECTS.md?v=${Date.now()}`, { cache: 'no-store' });
                const text = await response.text();
                container.innerHTML = text.split('\n').filter(line => line.trim().startsWith('-')).map(line => {
                    const [name, progress] = line.replace(/^- /, '').split('|').map(part => part.trim());
                    const percent = progress ? progress.replace('%', '') : '0';
                    return `<div>
                        <div class="mb-1.5 flex justify-between"><span class="text-xs font-bold text-slate-600 dark:text-slate-300">${name}</span><span class="text-xs font-bold text-indigo-600 dark:text-indigo-400">${progress || '0%'}</span></div>
                        <div class="h-1.5 w-full rounded-full bg-slate-100 dark:bg-slate-700"><div class="progress-bar h-1.5 rounded-full bg-indigo-500 dark:bg-indigo-400" style="width: 0%" data-target="${percent}%"></div></div>
                    </div>`;
                }).join('');
                setTimeout(() => document.querySelectorAll('.progress-bar').forEach(bar => { bar.style.width = bar.dataset.target; }), 100);
            } catch (e) { container.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Error en proyectos.</p>'; }
        }

        async function loadNotes() {
            const container = document.getElementById('notes-container');
            try {
                const response = await fetch(`NOTES.md?v=${Date.now()}`, { cache: 'no-store' });
                const text = await response.text();
                container.innerHTML = text.split('\n').filter(line => line.trim().startsWith('-')).map(line => {
                    return `<div class="note-item rounded-r-lg p-4 shadow-sm transition-all duration-300 hover:shadow-md dark:shadow-black/20">
                        <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-200">${line.replace(/^- /, '')}</p>
                    </div>`;
                }).join('');
            } catch (e) { container.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Error en notas.</p>'; }
        }

        loadSystemMetrics();
        loadTasks();
        loadProjects();
        loadNotes();
    </script>
</body>
</html>
