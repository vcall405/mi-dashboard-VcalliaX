<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VcalliaX Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfd; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 0.5); }
        .task-done { opacity: 0.5; text-decoration: line-through; }
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight text-slate-900">System <span class="text-indigo-600 font-light italic">Dashboard</span></h1>
                <p class="text-slate-500 mt-2">VcalliaX Intelligence Hub</p>
            </div>
            <div class="text-right hidden md:block">
                <div id="date-display" class="text-sm font-medium text-slate-400 uppercase tracking-widest"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Columna Izquierda: Radar de Proyectos -->
            <div class="space-y-6">
                <section class="glass-card rounded-3xl p-8 shadow-sm">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                        Radar de Proyectos
                    </h2>
                    <div id="projects-container" class="space-y-6">
                        <!-- Los proyectos se cargarán aquí -->
                    </div>
                </section>

                <!-- Estado del Sistema (Antes en la derecha, ahora aquí para equilibrar) -->
                <section class="glass-card rounded-3xl p-8 shadow-sm bg-indigo-600 text-white border-none">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        System Status
                    </h2>
                    <div class="space-y-4 opacity-90">
                        <div class="flex justify-between text-sm"><span>GitHub Pages</span><span class="font-bold">Online</span></div>
                        <div class="flex justify-between text-sm"><span>Data Source</span><span class="font-bold">Markdown</span></div>
                    </div>
                </section>
            </div>

            <!-- Columna Derecha: Tareas (Más ancha) -->
            <div class="lg:col-span-2 space-y-6">
                <section class="glass-card rounded-3xl p-8 shadow-sm">
                    <h2 class="text-xl font-semibold text-slate-800 flex items-center mb-6">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Próximas Tareas
                    </h2>
                    <div id="tasks-container" class="space-y-4">
                        <!-- Las tareas se cargarán aquí -->
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // Fecha actual
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Cargar Tareas
        async function loadTasks() {
            const container = document.getElementById('tasks-container');
            try {
                const response = await fetch('TASKS.md');
                const text = await response.text();
                const lines = text.split('\n');
                container.innerHTML = '';
                lines.forEach(line => {
                    if (line.trim().startsWith('-')) {
                        const isDone = line.includes('[x]');
                        const taskText = line.replace(/^- \[[ x]\] /, '').replace(/^- /, '');
                        const el = document.createElement('div');
                        el.className = `flex items-center p-4 bg-white/50 rounded-2xl border border-slate-100 transition-all ${isDone ? 'task-done' : 'hover:border-indigo-200'}`;
                        el.innerHTML = `
                            <div class="w-6 h-6 rounded-full border-2 ${isDone ? 'bg-indigo-500 border-indigo-500' : 'border-indigo-400'} mr-4 flex-shrink-0 flex items-center justify-center">
                                ${isDone ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>' : ''}
                            </div>
                            <span class="font-medium">${taskText}</span>
                        `;
                        container.appendChild(el);
                    }
                });
            } catch (e) { container.innerHTML = "Error cargando TASKS.md"; }
        }

        // Cargar Proyectos (Radar)
        async function loadProjects() {
            const container = document.getElementById('projects-container');
            try {
                const response = await fetch('PROJECTS.md');
                const text = await response.text();
                const lines = text.split('\n');
                container.innerHTML = '';
                lines.forEach(line => {
                    if (line.trim().startsWith('-')) {
                        const parts = line.replace(/^- /, '').split('|').map(p => p.trim());
                        if (parts.length >= 2) {
                            const [name, progress, status] = parts;
                            const percent = progress.replace('%', '');
                            const el = document.createElement('div');
                            el.innerHTML = `
                                <div class="flex justify-between mb-2">
                                    <span class="text-sm font-semibold text-slate-700">${name}</span>
                                    <span class="text-xs font-bold text-indigo-600">${progress}</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2">
                                    <div class="progress-bar bg-indigo-500 h-2 rounded-full" style="width: 0%" data-target="${percent}%"></div>
                                </div>
                                <div class="mt-1 text-[10px] uppercase tracking-wider text-slate-400 font-bold">${status || 'Active'}</div>
                            `;
                            container.appendChild(el);
                        }
                    }
                });
                // Animación de las barras
                setTimeout(() => {
                    document.querySelectorAll('.progress-bar').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-target');
                    });
                }, 100);
            } catch (e) { container.innerHTML = "Crea PROJECTS.md para ver tus proyectos."; }
        }

        loadTasks();
        loadProjects();
    </script>
</body>
</html>
