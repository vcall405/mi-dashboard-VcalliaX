<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Memory Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfd; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 0.5); }
        .task-done { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-4xl font-semibold text-slate-900 tracking-tight">System <span class="text-indigo-600 font-light italic">Dashboard</span></h1>
                <p class="text-slate-500 mt-2">VcalliaX Intelligence Hub</p>
            </div>
            <div class="text-right hidden md:block">
                <div id="date-display" class="text-sm font-medium text-slate-400 uppercase tracking-widest"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <section class="glass-card rounded-3xl p-8 shadow-sm">
                    <h2 class="text-xl font-semibold text-slate-800 flex items-center mb-6">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Tareas desde TASKS.md
                    </h2>
                    <div id="tasks-container" class="space-y-4 text-slate-600">
                        <p class="text-sm italic">Cargando tareas...</p>
                    </div>
                </section>
            </div>

            <div class="space-y-6">
                <section class="glass-card rounded-3xl p-8 shadow-sm bg-indigo-600 text-white border-none">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Estado del Sistema
                    </h2>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between text-sm">
                            <span>GitHub Pages</span>
                            <span class="px-2 py-1 bg-green-400/20 rounded text-xs">Online</span>
                        </div>
                        <div class="flex items-center justify-between text-sm">
                            <span>Sincronización</span>
                            <span class="px-2 py-1 bg-white/20 rounded text-xs">Auto-fetch</span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // Mostrar fecha actual
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Función para cargar y procesar TASKS.md
        async function loadTasks() {
            const container = document.getElementById('tasks-container');
            try {
                const response = await fetch('TASKS.md');
                if (!response.ok) throw new Error('No se encontró TASKS.md');
                
                const text = await response.text();
                const lines = text.split('\n');
                
                container.innerHTML = ''; // Limpiar contenedor
                
                lines.forEach(line => {
                    if (line.trim().startsWith('-')) {
                        const isDone = line.includes('[x]');
                        const taskText = line.replace(/^- \[[ x]\] /, '').replace(/^- /, '');
                        
                        const taskElement = document.createElement('div');
                        taskElement.className = `flex items-center p-4 bg-white/50 rounded-2xl border border-slate-100 transition-all ${isDone ? 'task-done' : 'hover:border-indigo-200'}`;
                        
                        taskElement.innerHTML = `
                            <div class="w-6 h-6 rounded-full border-2 ${isDone ? 'bg-indigo-500 border-indigo-500' : 'border-indigo-400'} mr-4 flex-shrink-0 flex items-center justify-center">
                                ${isDone ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>' : ''}
                            </div>
                            <span class="font-medium">${taskText}</span>
                        `;
                        container.appendChild(taskElement);
                    }
                });
            } catch (error) {
                container.innerHTML = `<p class="text-red-400">Error: Crea un archivo TASKS.md en el repo para ver tus tareas.</p>`;
            }
        }

        loadTasks();
    </script>
</body>
</html>
